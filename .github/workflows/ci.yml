name: Build and Push to GHCR

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update image tag in gitops
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
          SHA: sha-${{ github.sha }}
        run: |
          git clone https://x-token:${GITOPS_TOKEN}@github.com/kerbatek/gitops.git /tmp/gitops
          cd /tmp/gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          yq -i '.spec.source.helm.valuesObject.image.tag = strenv(SHA)' k8s/argocd/apps/portfolio.yaml
          git add k8s/argocd/apps/portfolio.yaml
          git commit -m "chore: bump portfolio image to ${SHA}"
          git pull --rebase
          git push
