<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mateusz Rembiasz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #fafaf9;
            --text: #1c1917;
            --muted: #78716c;
            --accent: #292524;
            --border: #e7e5e4;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 440px;
            width: 100%;
        }

        .name {
            font-size: 1.75rem;
            font-weight: 500;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
        }

        .bio {
            font-size: 0.95rem;
            font-weight: 300;
            line-height: 1.6;
            color: var(--muted);
            margin-bottom: 2.5rem;
        }

        .section-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 0.75rem;
        }

        .links {
            list-style: none;
            margin-bottom: 2.5rem;
        }

        .links li {
            border-top: 1px solid var(--border);
        }

        .links li:last-child {
            border-bottom: 1px solid var(--border);
        }

        .links a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 0.25rem;
            text-decoration: none;
            color: var(--text);
            font-size: 0.95rem;
            font-weight: 400;
            transition: padding-left 0.2s ease;
        }

        .links a:hover {
            padding-left: 0.5rem;
        }

        .links .meta {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .links .arrow {
            transition: transform 0.2s ease;
        }

        .links a:hover .arrow {
            transform: translateX(3px);
        }

        .social {
            display: flex;
            gap: 1.5rem;
        }

        .social a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: color 0.2s ease;
        }

        .social a:hover {
            color: var(--text);
        }

        .social svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        @media (max-width: 480px) {
            .name { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="name">Mateusz Rembiasz</h1>
	<p class="bio">Infrastructure, cloud, and self-hosting.<br> Automating everything that shouldn't be done twice.</p>

        <p class="section-label">Projects</p>
        <ul class="links">
            <li>
                <a href="https://github.com/kerbatek/infra" target="_blank" rel="noopener">
                    <span>infra</span>
                    <span class="meta"><span>HCL</span><span class="arrow">&rarr;</span></span>
                </a>
            </li>
            <li>
                <a href="https://github.com/kerbatek/gitops" target="_blank" rel="noopener">
                    <span>gitops</span>
                    <span class="meta"><span class="arrow">&rarr;</span></span>
                </a>
            </li>
            <li>
                <a href="https://github.com/kerbatek/url-shortener" target="_blank" rel="noopener">
                    <span>url-shortener</span>
                    <span class="meta"><span>Go</span><span class="arrow">&rarr;</span></span>
                </a>
            </li>
        </ul>

        <p class="section-label">Services</p>
        <ul class="links">
            <li>
                <a href="https://files.mrembiasz.pl">
                    <span>Files</span>
                    <span class="meta"><span class="arrow">&rarr;</span></span>
                </a>
            </li>
        </ul>

        <p class="section-label">Elsewhere</p>
        <div class="social">

</body>
</html>
