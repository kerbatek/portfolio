{{ define "container-class" }} container--wide{{ end }}

{{ define "main" }}
<h1 class="page-title">Tags</h1>

<div class="projects">
    {{ range .Pages }}
    <a class="project" href="{{ .Permalink }}">
        <div class="project-header">
            <span class="project-name">#{{ .Title }}</span>
            <span class="project-lang">{{ .Pages.Len }} {{ if eq (.Pages.Len) 1 }}post{{ else }}posts{{ end }}</span>
        </div>
    </a>
    {{ end }}
</div>
{{ end }}
